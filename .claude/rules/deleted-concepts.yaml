# deleted-concepts.yaml
#
# Purpose:
#   A catalog of "deleted paths and concepts" for systematically detecting
#   migration residues in Harness.
#
#   Added in Phase 40. Background: within 2 days of the v4.0.0 "Hokage" release,
#   13 v3 residue bugs were discovered by accident. All were blind spots in
#   inclusion-based verification (failing to check "does deleted X still remain?").
#   This file functions as the SSOT for exclusion-based verification.
#
# Update Rules:
#   1. When new deleted paths/concepts arise, update this file at the time of deletion
#   2. Allowlist is applied using prefix matching (historical documents are explicitly excluded)
#   3. The reason field is required. Describe "why it was deleted"
#   4. Scans are run via scripts/check-residue.py
#   5. Update deleted_in when the version changes
#
# Allowlist Design Principles:
#   - CHANGELOG.md: allowlisted for all entries (historical records)
#   - .claude/memory/archive/: allowlisted for all entries (archives)
#   - .claude/worktrees/: allowlisted for all entries (past worktree residues)
#   - .claude/state/: allowlisted for all entries (session state snapshots)
#   - out/, output/: allowlisted for all entries (generated artifacts and diagnostic output)
#   - docs/social/: allowlisted for all entries (v3-era social media posts and historical records)
#   - Historical documents should be added individually as entries
#

version: 1

# ─── Deleted File Paths ──────────────────────────────────────────────────────
deleted_paths:
  - path: "core/src/guardrails"
    deleted_in: "v4.0.0"
    reason: "TypeScript guardrail engine ported to Go-native (Hokage migration). Entire core/ including TS engine was discontinued"
    allowlist:
      - "CHANGELOG.md"
      - ".claude/memory/"  # Historical memory records (decisions.md, patterns.md contain pre-v4 architecture)
      - ".claude/worktrees/"
      - ".claude/state/"
      - "go/"  # Excluded because Go version file paths contain "guardrails"
      - "Plans.md"
      - "out/"
      - "output/"
      - "docs/social/"  # v3-era social media posts (historical records)
      - "skills/claude-codex-upstream-update/"  # Upstream update guide (contains historical references)
      - ".claude/rules/migration-policy.md"  # Phase 40 historical description (appendix contains deleted paths)

  - path: "scripts/ci"
    deleted_in: "v4.1.3"
    reason: "Phase 45 script reorganization moved CI-only scripts from scripts/ci/ to .claude/scripts/. The directory was emptied and removed."
    allowlist:
      - "CHANGELOG.md"
      - "Plans.md"
      - ".claude/memory/archive/"
      - ".claude/worktrees/"
      - ".claude/state/"
      - "out/"
      - "output/"

  - path: "core/dist"
    deleted_in: "v4.0.0"
    reason: "TypeScript build artifacts. No longer needed after Go migration"
    allowlist:
      - "CHANGELOG.md"
      - ".claude/memory/"  # Historical memory records (decisions.md, patterns.md contain pre-v4 architecture)
      - ".claude/worktrees/"
      - ".claude/state/"
      - "Plans.md"
      - "out/"
      - "output/"
      - "docs/social/"


# ─── Deleted Concepts and Terms ─────────────────────────────────────────────
deleted_concepts:
  - term: "TypeScript guardrail engine"
    replacement: "Go-native guardrail engine"
    deleted_in: "v4.0.0"
    reason: "TS→Go port completed in Hokage migration. References to the TS engine are descriptions of the old version"
    allowlist:
      - "CHANGELOG.md"
      - ".claude/memory/archive/"
      - ".claude/worktrees/"
      - ".claude/state/"
      - "docs/CLAUDE_CODE_COMPATIBILITY.md"  # Comparison document
      - "docs/github-harness-plugin-benchmark.md"
      - "docs/MIGRATION-v4.md"  # v3→v4 migration guide (references to TS engine as migration source are legitimate)
      - "docs/social/"  # v3-era social media posts
      - "docs/claims-audit.md"  # Old marketing audit document
      - "docs/distribution-scope.md"  # Distribution scope analysis (based on old version)
      - "docs/private/"  # Private analysis documents
      - "docs/positioning-notes.md"  # Old positioning document
      - "docs/release-copy-phase21.md"  # Phase 21 release copy
      - ".claude/rules/"  # Rules files (versioning.md contains historical references)
      - "Plans.md"
      - "out/"
      - "output/"

  - term: "Harness v3"
    replacement: "Harness v4"
    deleted_in: "v4.0.0"
    reason: "Old version label. v4 Hokage is the current version"
    allowlist:
      - "CHANGELOG.md"
      - ".claude/memory/archive/"
      - ".claude/worktrees/"
      - ".claude/state/"
      - ".claude/rules/v3-architecture.md"  # Historical document for v3 architecture
      - "docs/CLAUDE-feature-table.md"  # Historical table (contains old version comparisons)
      - "docs/MIGRATION-v4.md"  # v3→v4 migration guide
      - "docs/distribution-scope.md"  # Distribution scope document
      - "docs/social/"  # v3-era social media posts (historical records)
      - "harness/scripts/setup-codex.sh"  # Uses "Harness v3" as a grep detection pattern (intentional)
      - "harness/scripts/codex-setup-local.sh"  # Same as above
      - "tests/test-codex-package.sh"  # v3 legacy skill tests (comments)
      - ".claude/rules/migration-policy.md"  # Phase 40 historical description (appendix contains old version names)
      - "out/"
      - "output/"
      - "Plans.md"

  - term: "# "
    replacement: null
    deleted_in: "v4.0.0"
    reason: "Adding (v3) suffix to SKILL.md H1 titles has been discontinued. v4 does not append version suffixes to H1 headings"
    # Note: This term is too generic to use.
    # Instead, check-residue.py performs pattern matching limited to H1 lines
    # (search with: grep -rn "^# .*(v3)" skills/ agents/)
    # This concept is recorded as a comment but excluded from term-based scanning
    _scan_disabled: true
    allowlist:
      - "CHANGELOG.md"

  - term: "Node.js 18+"
    replacement: "Go 1.22+"
    deleted_in: "v4.0.0"
    reason: "v3's Node.js dependency has been discontinued. v4 Go binaries require no runtime. Node.js requirements are false requirements in documentation"
    allowlist:
      - "CHANGELOG.md"
      - ".claude/memory/archive/"
      - ".claude/worktrees/"
      - ".claude/state/"
      - "out/"
      - "output/"
      - "Plans.md"
      - "skills/generate-video/"  # Video generation skill may use Node.js (old path, pre-v4.2.1)
      - ".claude/skills/generate-video/"  # Video generation skill relocated here in v4.2.1
      - ".claude/rules/migration-policy.md"  # Phase 40 historical description (appendix contains old runtime requirements)

  - term: "claude-mem"
    replacement: "harness-mem"
    deleted_in: "v4.0.3"
    reason: "Dependency on third-party claude-mem (thedotmack) discontinued. Session memory unified to Harness-native harness-mem. claude-mem causes skill mis-registration by auto-generating commands/*/CLAUDE.md"
    allowlist:
      - "CHANGELOG.md"
      - ".claude/memory/archive/"
      - ".claude/worktrees/"
      - ".claude/state/"
      - "out/"
      - "output/"
      - "Plans.md"
      - "docs/social/"  # v3-era social media posts
      - "docs/CLAUDE-feature-table.md"  # Historical CC compatibility records
      - ".claude/rules/"  # Historical descriptions such as migration-policy
      - "**/CLAUDE.md"  # Files generated by claude-mem are excluded by gitignore. Local untracked files are treated as outside scan scope
      - "harness-ui-archive/"  # Archived UI project (old feature depending on claude-mem; not to be reused)
      - ".claude/Plans.md"  # Local Plans.md
      - ".claude/memory/"  # Local memory archive (decisions.md, patterns.md)
      - ".claude/agent-memory/"  # Local agent memory
      - ".claude/plugins/cache/"  # Plugin cache
      - ".cursor/"  # Cursor IDE local settings
      - "docs/design/"  # UI design documents (old feature design depending on claude-mem)
      - "docs/research/"  # Research documents (includes claude-mem integration research)
      - "go/cmd/harness/mem.go"  # harness mem health subcommand — checks ~/.claude-mem dir as the harness-mem install path
      - "go/cmd/harness/mem_test.go"  # tests for mem.go — references .claude-mem as the target directory name
      - "harness/bin/"  # compiled binaries embed strings from mem.go (allowlisted above); binary artifacts are not residues
      - "harness/docs/session-monitor-drift.md"  # drift-monitoring doc — references ~/.claude-mem as the harness-mem install path (not a residue)

