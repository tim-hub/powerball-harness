<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 380" fill="none">
  <defs>
    <filter id="shadowMatrixJa">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 11px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #64748b; }
      .head { font: 700 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .label { font: 600 12px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #1e293b; }
      .caption { font: 500 10px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #64748b; }
      .cellText { font: 700 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect width="980" height="380" rx="24" fill="#fffaf5"/>
  <rect x="1" y="1" width="978" height="378" rx="23" stroke="#fed7aa" stroke-width="2"/>

  <text x="36" y="42" class="title">導入後の標準フロー比較</text>
  <text x="36" y="63" class="subtitle">理論上できることではなく、導入後の標準運用で比較。2026-03-06 時点。</text>

  <g transform="translate(36 86)">
    <g filter="url(#shadowMatrixJa)">
      <rect width="908" height="240" rx="18" fill="#ffffff"/>
    </g>
    <rect width="908" height="240" rx="18" fill="none" stroke="#e2e8f0"/>

    <rect x="0" y="0" width="320" height="48" rx="18" fill="#fff7ed"/>
    <rect x="320" y="0" width="196" height="48" fill="#fff1e6"/>
    <rect x="516" y="0" width="196" height="48" fill="#f8fafc"/>
    <rect x="712" y="0" width="196" height="48" rx="18" fill="#f8fafc"/>

    <text x="20" y="30" class="head">導入後に変わること</text>
    <text x="418" y="30" text-anchor="middle" class="head">Claude Harness</text>
    <text x="614" y="30" text-anchor="middle" class="head">Superpowers</text>
    <text x="810" y="30" text-anchor="middle" class="head">cc-sdd</text>

    <g transform="translate(0 48)">
      <line x1="0" y1="32" x2="908" y2="32" stroke="#e2e8f0"/>
      <line x1="0" y1="64" x2="908" y2="64" stroke="#e2e8f0"/>
      <line x1="0" y1="96" x2="908" y2="96" stroke="#e2e8f0"/>
      <line x1="0" y1="128" x2="908" y2="128" stroke="#e2e8f0"/>
      <line x1="0" y1="160" x2="908" y2="160" stroke="#e2e8f0"/>
      <line x1="0" y1="192" x2="908" y2="192" stroke="#e2e8f0"/>

      <line x1="320" y1="0" x2="320" y2="192" stroke="#e2e8f0"/>
      <line x1="516" y1="0" x2="516" y2="192" stroke="#e2e8f0"/>
      <line x1="712" y1="0" x2="712" y2="192" stroke="#e2e8f0"/>

      <rect x="320" y="0" width="196" height="192" fill="#fff7ed" opacity="0.65"/>

      <text x="20" y="21" class="label">計画が会話で消えずに残る</text>
      <text x="20" y="53" class="label">実装が毎回同じ流れで進む</text>
      <text x="20" y="85" class="label">レビューが完了前の工程に入る</text>
      <text x="20" y="117" class="label">危険操作を実行時ガードで止める</text>
      <text x="20" y="149" class="label">検証をあとからやり直せる</text>
      <text x="20" y="181" class="label">承認後は一気通貫で進められる</text>

      <text x="418" y="22" text-anchor="middle" class="cellText">標準</text>
      <text x="418" y="54" text-anchor="middle" class="cellText">標準</text>
      <text x="418" y="86" text-anchor="middle" class="cellText">標準</text>
      <text x="418" y="118" text-anchor="middle" class="cellText">標準</text>
      <text x="418" y="150" text-anchor="middle" class="cellText">標準</text>
      <text x="418" y="182" text-anchor="middle" class="cellText">標準</text>

      <text x="614" y="22" text-anchor="middle" class="cellText">標準</text>
      <text x="614" y="54" text-anchor="middle" class="cellText">標準</text>
      <text x="614" y="86" text-anchor="middle" class="cellText">標準</text>
      <text x="614" y="118" text-anchor="middle" class="cellText">一部</text>
      <text x="614" y="150" text-anchor="middle" class="cellText">一部</text>
      <text x="614" y="182" text-anchor="middle" class="cellText">一部</text>

      <text x="810" y="22" text-anchor="middle" class="cellText">標準</text>
      <text x="810" y="54" text-anchor="middle" class="cellText">一部</text>
      <text x="810" y="86" text-anchor="middle" class="cellText">一部</text>
      <text x="810" y="118" text-anchor="middle" class="cellText">主軸外</text>
      <text x="810" y="150" text-anchor="middle" class="cellText">標準</text>
      <text x="810" y="182" text-anchor="middle" class="cellText">主軸外</text>
    </g>
  </g>

  <g transform="translate(36 344)">
    <circle cx="8" cy="0" r="8" fill="#fff7ed" stroke="#fb923c"/>
    <text x="24" y="4" class="caption">Claude Harness は、計画・実行・レビュー・検証を標準フローとして崩さず回しやすい。</text>
  </g>
</svg>
