<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 340" fill="none">
  <defs>
    <linearGradient id="bgWhyJa" x1="0" y1="0" x2="980" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffaf5"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadowWhyJa">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 12px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #64748b; }
      .cardTitle { font: 700 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .cardBody { font: 500 12px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #475569; }
      .cardKicker { font: 700 11px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #ea580c; letter-spacing: 0.06em; }
      .footer { font: 600 11px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="980" height="340" rx="28" fill="url(#bgWhyJa)"/>
  <rect x="1" y="1" width="978" height="338" rx="27" stroke="#fed7aa" stroke-width="2"/>

  <text x="36" y="44" class="title">Harness を入れると最初に変わること</text>
  <text x="36" y="66" class="subtitle">賢いプロンプト集ではなく、Claude Code を崩れにくい標準フローへ変えます。</text>

  <g transform="translate(36 92)" filter="url(#shadowWhyJa)">
    <rect width="284" height="190" rx="22" fill="#ffffff"/>
    <rect x="1" y="1" width="282" height="188" rx="21" stroke="#e2e8f0"/>
    <text x="28" y="36" class="cardKicker">着手前</text>
    <circle cx="50" cy="78" r="22" fill="#fff7ed" stroke="#fdba74"/>
    <path d="M41 78 L48 85 L61 70" fill="none" stroke="#f7931a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="76" class="cardTitle">計画がリポジトリに残る</text>
    <text x="84" y="94" class="cardBody">会話だけで流れにくくなります。</text>
    <text x="28" y="132" class="cardBody">Harness は作業計画を `Plans.md` に</text>
    <text x="28" y="149" class="cardBody">書き出すので、判断、スコープ、受入</text>
    <text x="28" y="166" class="cardBody">条件がセッション後も追えます。</text>
  </g>

  <g transform="translate(348 92)" filter="url(#shadowWhyJa)">
    <rect width="284" height="190" rx="22" fill="#ffffff"/>
    <rect x="1" y="1" width="282" height="188" rx="21" stroke="#e2e8f0"/>
    <text x="28" y="36" class="cardKicker">実行中</text>
    <circle cx="50" cy="78" r="22" fill="#fff7ed" stroke="#fdba74"/>
    <path d="M39 82 L39 73 C39 67 44 62 50 62 C56 62 61 67 61 73 L61 82" fill="none" stroke="#f7931a" stroke-width="3" stroke-linecap="round"/>
    <rect x="42" y="80" width="16" height="14" rx="4" fill="none" stroke="#f7931a" stroke-width="3"/>
    <text x="84" y="76" class="cardTitle">危険操作を実行時に守る</text>
    <text x="84" y="94" class="cardBody">注意書きだけに頼りません。</text>
    <text x="28" y="132" class="cardBody">TypeScript 製のフックとルールで、</text>
    <text x="28" y="149" class="cardBody">危険な操作を実際の実行経路で止め</text>
    <text x="28" y="166" class="cardBody">やすくします。</text>
  </g>

  <g transform="translate(660 92)" filter="url(#shadowWhyJa)">
    <rect width="284" height="190" rx="22" fill="#ffffff"/>
    <rect x="1" y="1" width="282" height="188" rx="21" stroke="#e2e8f0"/>
    <text x="28" y="36" class="cardKicker">変更後</text>
    <circle cx="50" cy="78" r="22" fill="#fff7ed" stroke="#fdba74"/>
    <path d="M42 74 L58 74" stroke="#f7931a" stroke-width="3" stroke-linecap="round"/>
    <path d="M42 82 L54 82" stroke="#f7931a" stroke-width="3" stroke-linecap="round"/>
    <path d="M42 90 L58 90" stroke="#f7931a" stroke-width="3" stroke-linecap="round"/>
    <text x="84" y="76" class="cardTitle">検証をあとからやり直せる</text>
    <text x="84" y="94" class="cardBody">その場かぎりの成功で終わりません。</text>
    <text x="28" y="132" class="cardBody">チェック、evidence スクリプト、</text>
    <text x="28" y="149" class="cardBody">レビュー工程をあとから同じ手順で</text>
    <text x="28" y="166" class="cardBody">再実行できます。</text>
  </g>

  <text x="490" y="314" text-anchor="middle" class="footer">setup / plan / work / review / release を同じ運用の流れで扱えます。</text>
</svg>
