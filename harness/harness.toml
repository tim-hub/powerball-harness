# Harness v4 Configuration
# Edit this file, then run `harness sync` to generate CC plugin files.

[project]
name = "powerball-harness"
version = "4.3.0"
description = "Powerball harness - A harness for builders to handle full-cycle contract development."
homepage = "https://github.com/tim-hub/powerball-harness"
repository = "https://github.com/tim-hub/powerball-harness"
license = "MIT"
keywords = ["claude-code", "plugin", "vibecoder", "workflow", "plan-work-review"]
outputStyles = "./output-styles/"

[project.author]
name = "tim-hub"
url = "https://github.com/tim-hub"

[env]
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"

[safety.permissions]
deny = [
  # --- privilege escalation ---
  "Bash(sudo:*)",

  # --- destructive file ops ---
  "Bash(rm -rf:*)",
  "Bash(rm -fr:*)",

  # --- sensitive file reads ---
  "Read(./.env)",
  "Read(./.env.*)",
  "Read(./secrets/**)",
  "Read(**/*.pem)",
  "Read(**/*.key)",
  "Read(**/*id_rsa*)",
  "Read(**/*id_ed25519*)",
  "Read(**/.aws/**)",
  "Read(**/.ssh/**)",
  "Read(**/.npmrc)",
  "Bash(* .env)",

  # --- disk destruction ---
  "Bash(dd if=/dev/zero of=/dev/*)",
  "Bash(dd if=/dev/random of=/dev/*)",
  "Bash(mkfs*)",
  "Bash(fdisk*)",
  "Bash(parted*)",
  "Bash(*fork*bomb*)",
  "Bash(> /dev/sda*)",
  "Bash(> /dev/nvme*)",
  "Bash(> /dev/sd*)",
  "Bash(cat /dev/urandom > *)",

  # --- account / credential ops ---
  "Bash(passwd*)",
  "Bash(cat ~/.aws/*)",
  "Bash(cat ~/.ssh/id_*)",
  "Bash(cat /root/.ssh/*)",
  "Bash(env | base64*)",
  "Bash(printenv | base64*)",
  "Bash(set | base64*)",
  "Bash(history | grep -i password*)",
  "Bash(history | grep -i token*)",
  "Bash(history | grep -i secret*)",
  "Bash(history | grep -i key*)",
  "Bash(grep -r password /etc/*)",
  "Bash(grep -r token /etc/*)",
  "Bash(find / -name id_rsa*)",
  "Bash(find / -name *.key*)",
  "Bash(find / -name *.pem*)",

  # --- reverse shells ---
  "Bash(bash -i >& /dev/tcp/*)",
  "Bash(sh -i >& /dev/tcp/*)",
  "Bash(python -c 'import socket*)",
  "Bash(php -r '$sock*)",
  "Bash(ruby -rsocket*)",
  "Bash(perl -e 'use Socket*)",
  "Bash(exec < /dev/tcp/*)",
  "Bash(exec > /dev/tcp/*)",
  "Bash(exec 3<>/dev/tcp/*)",

  # --- system shutdown ---
  "Bash(shutdown*)",
  "Bash(reboot*)",
  "Bash(halt*)",
  "Bash(poweroff*)",
  "Bash(init 0*)",
  "Bash(init 6*)",

  # --- log clearing ---
  "Bash(rm /var/log/*)",
  "Bash(> /var/log/*)",
  "Bash(echo > /var/log/*)",
  "Bash(truncate -s 0 /var/log/*)",

  # --- unsafe package installs ---
  "Bash(npm install -g * --unsafe-perm*)",
  "Bash(pip install * --break-system-packages*)",
  "Bash(gem install * --no-user-install*)",

  # --- kernel / system tampering ---
  "Bash(insmod *)",
  "Bash(rmmod *)",
  "Bash(modprobe *)",
  "Bash(sysctl -w *)",
  "Bash(chmod -R 777 /*)",
  "Bash(chmod 777 /etc/*)",
  "Bash(chmod 777 /bin/*)",
  "Bash(chmod 777 /usr/*)",
  "Bash(chown -R * /*)",
  "Bash(pkexec *)",
  "Bash(export PATH=*)",
  "Bash(export LD_LIBRARY_PATH=*)",
  "Bash(export PYTHONPATH=*)",
  "Bash(nsenter *)",
  "Bash(systemctl mask *)",
  "Bash(systemctl disable *)",
  "Bash(systemctl daemon-reload*)",
  "Bash(LD_PRELOAD=*)",
  "Bash(gdb -p *)",
  "Bash(ptrace *)",

  # --- crypto mining ---
  "Bash(*xmrig*)",
  "Bash(*monero*)",
  "Bash(*bitcoin*)",
  "Bash(*miner*)",
  "Bash(*ethereum*)",
  "Bash(*wallet.dat*)",
  "Bash(*privatekey*)",

  # --- bulk file deletion ---
  "Bash(find / -type f -delete*)",
  "Bash(find / -type d -delete*)",

  # --- cloud metadata exfil ---
  "Bash(curl http://169.254.169.254/*)",
  "Bash(wget http://169.254.169.254/*)",
  "Bash(curl http://metadata.google.internal/*)",
]
ask = [
  "Bash(rm -r:*)",
  "Bash(git reset --hard:*)",
  "Bash(git push -f:*)",
  "Bash(git push --force:*)",
  "Bash(git push --force-with-lease:*)",
  "Bash(git clean -f:*)",
  "Bash(git clean -fdx:*)",
  "Bash(git clean -fx:*)",
  "Bash(git rebase:*)",
  "Bash(git merge:*)",
  "Bash(npm install:*)",
  "Bash(npm exec:*)",
  "Bash(npx:*)",
  "Bash(bun install:*)",
  "Bash(pnpm install:*)",

  # --- database CLIs ---
  "Bash(psql:*)",
  "Bash(mysql:*)",
  "Bash(mongod:*)",
  "Bash(mongo:*)",

  # --- MCP ---
  "mcp__codex__*",

  # --- network listeners / remote exec ---
  "Bash(* | nc -l*)",
  "Bash(* | netcat -l*)",
  "Bash(* | socat *)",
  "Bash(* | base64 -d | sh*)",
  "Bash(* | base64 -d | bash*)",
  "Bash(curl * | sh*)",
  "Bash(curl * | bash*)",
  "Bash(wget * | sh*)",
  "Bash(wget * | bash*)",
  "Bash(curl * | sudo *)",
  "Bash(wget * | sudo *)",
  "Bash(curl -s * | sh*)",
  "Bash(wget -qO- * | sh*)",
  "Bash(nc -l*)",
  "Bash(netcat -l*)",
  "Bash(socat*)",
  "Bash(nmap*)",
  "Bash(masscan*)",

  # --- dangerous docker ---
  "Bash(docker run --privileged *)",
  "Bash(docker run --pid=host *)",
  "Bash(docker run --net=host *)",
  "Bash(docker run -v /:/host *)",
  "Bash(docker run -v /etc:/etc *)",
  "Bash(docker run -v /var/run/docker.sock:/var/run/docker.sock *)",
  "Bash(docker run --cap-add=ALL *)",
  "Bash(docker run --security-opt *)",

  # --- git destructive ---
  "Bash(git push --force origin master*)",
  "Bash(git push --force origin main*)",
  "Bash(git push -f origin master*)",
  "Bash(git push -f origin main*)",
  "Bash(git reset --hard *)",
]

[safety.sandbox]
failIfUnavailable = true

[safety.sandbox.filesystem]
denyRead = [
  ".env",
  ".env.*",
  "!.env.example",
  "secrets/**",
  "**/*.pem",
  "**/*.key",
  "**/*id_rsa*",
  "**/*id_ed25519*",
  "**/.aws/**",
  "**/.ssh/**",
]
allowRead = [
  ".env.example",
  ".env.sample",
  "config/public-*",
  "docs/**",
]

[telemetry]
# otel_endpoint = ""
# webhook_url = ""
