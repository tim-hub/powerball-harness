# Claude Code Harness Configuration
# https://github.com/tim-hub/powerball-harness

# Review settings
review:
  # Codex second opinion (requires Codex MCP server)
  codex:
    enabled: true
    timeout_ms: 60000 # Codex MCP timeout (ms)

  # Default mode: "default" (4 perspectives) or "codex" (parallel MCP execution)
  mode: codex

# Breezing settings (Agent Teams)
breezing:
  # Default parallel implementer count
  default_parallel: 2
  # Maximum retake attempts before user escalation
  max_retakes: 3
  # State file path
  state_file: .claude/state/breezing-active.json

# Cleanup thresholds
cleanup:
  plans:
    archive_after_days: 7
    max_lines: 200
  session_log:
    archive_after_days: 30
    max_lines: 500
  claude_md:
    max_lines: 100

# Session monitor settings
monitor:
  plans_drift:
    # Emit a warning when WIP task count is >= this value
    wip_threshold: 5
    # Emit a warning when Plans.md has not been modified for >= this many hours
    stale_hours: 24

# Advisor settings (Opus consultation strategy)
advisor:
  enabled: true
  mode: on-demand
  max_consults_per_task: 3
  retry_threshold: 2
  consult_before_user_escalation: true
  model_defaults:
    claude: opus
