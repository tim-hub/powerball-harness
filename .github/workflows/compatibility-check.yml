name: Template Existence Check

on:
  push:
    paths:
      - '.github/workflows/compatibility-check.yml'
      - 'skills/**'
      - 'templates/**'
  pull_request:
    paths:
      - '.github/workflows/compatibility-check.yml'
      - 'skills/**'
      - 'templates/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Codex template exists
        run: |
          test -f templates/codex/config.toml || { echo "::error::templates/codex/config.toml not found"; exit 1; }
          test -f templates/codex/rules/harness.rules || { echo "::error::templates/codex/rules/harness.rules not found"; exit 1; }
          test -f templates/codex/.codexignore || { echo "::error::templates/codex/.codexignore not found"; exit 1; }
          echo "✅ templates/codex/ verified"

      - name: Check OpenCode template exists
        run: |
          test -f templates/opencode/opencode.json || { echo "::error::templates/opencode/opencode.json not found"; exit 1; }
          test -d templates/opencode/commands || { echo "::error::templates/opencode/commands/ not found"; exit 1; }
          echo "✅ templates/opencode/ verified"

      - name: Check codex-native skill overrides exist
        run: |
          test -d templates/codex-skills || { echo "::error::templates/codex-skills/ not found"; exit 1; }
          echo "✅ templates/codex-skills/ verified"

      - name: Verify setup scripts exist
        run: |
          test -f skills/harness-setup/scripts/setup-codex.sh || { echo "::error::setup-codex.sh not found"; exit 1; }
          test -f skills/harness-setup/scripts/setup-opencode.sh || { echo "::error::setup-opencode.sh not found"; exit 1; }
          echo "✅ harness-setup scripts verified"
