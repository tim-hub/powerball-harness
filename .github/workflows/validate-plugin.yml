name: validate-plugin

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump (warn)
        id: version_bump
        continue-on-error: true
        run: |
          bash ./scripts/ci/check-version-bump.sh

      - name: Version bump missing (fail)
        if: steps.version_bump.outcome == 'failure'
        run: |
          echo "::warning title=Version bump missing::Code changes detected but VERSION was not bumped. Please bump version before merging."
          exit 1

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Validate plugin structure
        run: |
          bash ./tests/validate-plugin.sh

      - name: Check consistency (templates/refs/version/hooks)
        run: |
          bash ./scripts/ci/check-consistency.sh

      - name: Validate codex package (multi-agent migration guards)
        run: |
          bash ./tests/test-codex-package.sh

  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: core/package-lock.json

      - name: Install core dependencies
        working-directory: core
        run: npm ci

      - name: Typecheck core
        working-directory: core
        run: npm run typecheck

      - name: Run vitest
        working-directory: core
        run: npm test

