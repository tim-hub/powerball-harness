name: validate-plugin

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release metadata policy
        run: |
          bash ./scripts/ci/check-version-bump.sh

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Validate plugin structure
        run: |
          bash ./tests/validate-plugin.sh

      - name: Check consistency (templates/refs/version/hooks)
        run: |
          bash ./scripts/ci/check-consistency.sh

      - name: Validate codex package (multi-agent migration guards)
        run: |
          bash ./tests/test-codex-package.sh

  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: core/package.json

      - name: Install core dependencies
        working-directory: core
        run: npm install --package-lock=false

      - name: Typecheck core
        working-directory: core
        run: npm run typecheck

      - name: Run vitest
        working-directory: core
        run: npm test
