name: validate-plugin

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release metadata policy
        run: |
          bash ./scripts/ci/check-version-bump.sh

      - name: Install command-line dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build harness binary for validation scripts
        working-directory: go
        run: go build -o ../bin/harness-linux-amd64 ./cmd/harness/

      - name: Check i18n regression suite
        run: |
          bash ./scripts/i18n/check-translations.sh
          bash ./tests/test-i18n-default-language.sh
          bash ./tests/test-i18n-skill-frontmatter.sh
          bash ./tests/test-i18n-locale-roundtrip.sh
          bash ./tests/test-setup-language-rendering.sh
          bash ./tests/test-i18n-japanese-ux-regression.sh

      - name: Validate plugin structure
        run: |
          bash ./tests/validate-plugin.sh

      - name: Check consistency (templates/refs/version/hooks)
        run: |
          bash ./scripts/ci/check-consistency.sh

      - name: Validate codex package (multi-agent migration guards)
        run: |
          bash ./tests/test-codex-package.sh

  test-go:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build harness binary
        working-directory: go
        run: go build ./cmd/harness/

      - name: Run Go tests
        working-directory: go
        run: go test ./...

      - name: Run go vet
        working-directory: go
        run: go vet ./...
