name: validate-plugin

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release metadata policy
        run: make check-version-bump

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Validate plugin structure
        run: make validate

      - name: Check consistency (templates/refs/version/hooks)
        run: make check

      - name: Test all test scripts
        run: make test-all
      
      - name: Validate codex package (multi-agent migration guards)
        run: make codex-test

  test-go:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build harness binary
        working-directory: go
        run: go build ./cmd/harness/

      - name: Run Go tests
        working-directory: go
        run: go test ./...

      - name: Run go vet
        working-directory: go
        run: go vet ./...
