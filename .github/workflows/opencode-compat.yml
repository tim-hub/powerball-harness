name: Mirror Compatibility Check

on:
  push:
    paths:
      - '.github/workflows/opencode-compat.yml'
      - 'commands/**'
      - 'skills/**'
      - 'codex/.codex/skills/**'
      - 'scripts/build-opencode.js'
      - 'scripts/validate-opencode.js'
  pull_request:
    paths:
      - '.github/workflows/opencode-compat.yml'
      - 'commands/**'
      - 'skills/**'
      - 'codex/.codex/skills/**'
      - 'scripts/build-opencode.js'
      - 'scripts/validate-opencode.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build opencode version
        run: node scripts/build-opencode.js

      - name: Validate opencode format
        run: node scripts/validate-opencode.js

      - name: Check opencode mirror sync
        run: |
          if ! git diff --quiet opencode/; then
            echo "::error::opencode/ is out of sync with commands/"
            echo "Run 'node scripts/build-opencode.js' and commit the changes."
            git diff --stat opencode/
            exit 1
          fi
          echo "✅ opencode/ is in sync"

      - name: Check codex mirror sync
        run: |
          if [ -d "codex/.codex/skills" ] && [ -d "skills" ]; then
            DIFF=$(
              diff -rq skills/ codex/.codex/skills/ 2>/dev/null \
                | grep -v ".DS_Store" \
                | grep -v "^Only in skills/: cc-update-review$" \
                | grep -v "^Only in skills/: allow1$" \
                | grep -v "^Only in skills/: claude-codex-upstream-update$" \
                | grep -v "^Only in skills/: x-announce$" \
                | grep -v "^Only in skills/: x-article$" \
                || true
            )
            if [ -n "$DIFF" ]; then
              echo "::error::codex/.codex/skills/ is out of sync with skills/"
              echo "Run 'rsync -av --delete skills/ codex/.codex/skills/' (excluding internal-only skills) and commit the changes."
              echo "$DIFF" | head -20
              exit 1
            fi
            echo "✅ codex/.codex/skills/ is in sync"
          else
            echo "⚠️ Mirror directories not found, skipping"
          fi
