name: auto-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Release $TAG already exists (created by release-har). Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Release $TAG not found. Creating safety-net release."
          fi

      - name: Extract CHANGELOG entry
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release $TAG (auto-generated — no CHANGELOG entry found for this version)"
          fi

          # Write to file to preserve newlines
          echo "$BODY" > /tmp/release-body.md

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go binaries
        run: |
          cd go && bash scripts/build-all.sh

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-body.md \
            --verify-tag \
            harness/bin/harness-darwin-arm64 \
            harness/bin/harness-darwin-amd64 \
            harness/bin/harness-linux-amd64
          echo "✅ Release created for $TAG with Go binaries"

      - name: Upload Go binaries to existing release
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Upload binaries if not already attached
          for bin in harness/bin/harness-darwin-arm64 harness/bin/harness-darwin-amd64 harness/bin/harness-linux-amd64; do
            gh release upload "$TAG" "$bin" --clobber 2>/dev/null || true
          done

          echo "✅ Go binaries uploaded to $TAG"
