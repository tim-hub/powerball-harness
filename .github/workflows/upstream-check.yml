name: Upstream Sync Check

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream activity (last 24 hours)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
              || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')

          COMMITS=$(gh api "repos/Chachamaru127/claude-code-harness/commits?sha=main&since=${SINCE}" \
            --jq 'length')

          echo "Upstream commits in the last 24 hours: $COMMITS"

          if [ "$COMMITS" -gt 0 ]; then
            echo ""
            echo "::warning::Upstream has $COMMITS new commit(s) in the last 24 hours."
            echo ""
            echo "Recent upstream commits:"
            gh api "repos/Chachamaru127/claude-code-harness/commits?sha=main&since=${SINCE}" \
              --jq '.[] | "\(.sha[0:7]) \(.commit.message | split("\n")[0])"'
            exit 1
          fi

          echo "No upstream changes in the last 24 hours."
