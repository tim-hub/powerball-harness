version: 1
updated_at: "2026-03-30"
entries:
  - id: independent-review-before-complete
    component: harness-work
    kind: workflow-contract
    assumption: "The person who implemented a change cannot reliably find all gaps and oversights in their own work."
    model_limit_addressed: "Self-evaluation bias"
    retirement_signal: "A single-model run consistently matches the defect detection rate of independent review across multiple rounds."
    validation: "Compare defect escape rate between Solo and Breezing."
  - id: sprint-contract-before-worker
    component: sprint-contract
    kind: artifact
    assumption: "DoD in Plans.md alone is too coarse for success criteria, causing implementation and review to operate on different standards."
    model_limit_addressed: "Insufficient goal resolution"
    retirement_signal: "DoD alone achieves the same rework rate as having a contract."
    validation: "Compare fix-loop count with and without contract."
  - id: structured-handoff-artifact
    component: context-reset
    kind: state-transfer
    assumption: "In long-running executions, summary-only handoffs lose next actions and failure reasons."
    model_limit_addressed: "Context anxiety and handoff degradation"
    retirement_signal: "Post-compaction resumes show no increase in incomplete tasks or re-explanation costs."
    validation: "Track first-action latency and handoff deficiency count after resume."
  - id: runtime-review-profile
    component: reviewer-profile-runtime
    kind: evaluator
    assumption: "Static review alone cannot sufficiently catch changes that break at runtime."
    model_limit_addressed: "Static analysis blind spots"
    retirement_signal: "Defect escape rate remains sufficiently low without runtime execution."
    validation: "Compare test-originating miss counts with and without runtime profile execution."
  - id: browser-review-profile
    component: reviewer-profile-browser
    kind: evaluator
    assumption: "UI layout issues and interaction failures are difficult to judge from code diffs alone."
    model_limit_addressed: "Visual and interaction quality blind spots"
    retirement_signal: "Static + runtime alone keeps UI bug escape rate within acceptable range."
    validation: "Measure post-hoc UI bug count before and after browser evaluator introduction."
