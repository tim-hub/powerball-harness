<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none">
  <defs>
    <filter id="shBA"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="720" height="260" rx="12" fill="#ffffff"/>
  <rect width="720" height="260" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- LEFT: Without Harness -->
  <g filter="url(#shBA)">
    <rect x="24" y="20" width="320" height="220" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  </g>
  <circle cx="50" cy="44" r="9" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.8"/>
  <path d="M46 40 L54 48 M54 40 L46 48" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <text x="64" y="48" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="12" font-weight="700" fill="#dc2626">Without Harness</text>

  <!-- Chaos illustration -->
  <g transform="translate(240, 80)">
    <rect x="0" y="0" width="45" height="28" rx="3" fill="#fff1f2" stroke="#fecdd3" stroke-width="0.5" opacity="0.6" transform="rotate(-12 22 14)"/>
    <rect x="30" y="30" width="45" height="28" rx="3" fill="#fff1f2" stroke="#fecdd3" stroke-width="0.5" opacity="0.5" transform="rotate(8 52 44)"/>
    <rect x="-10" y="50" width="45" height="28" rx="3" fill="#fff1f2" stroke="#fecdd3" stroke-width="0.5" opacity="0.4" transform="rotate(-5 12 64)"/>
    <g transform="translate(60, 15)" opacity="0.7">
      <polygon points="0,-8 7,5 -7,5" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
      <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#f59e0b">!</text>
    </g>
    <g transform="translate(10, 35)" opacity="0.5">
      <polygon points="0,-6 5,4 -5,4" fill="none" stroke="#ef4444" stroke-width="1"/>
      <text x="0" y="2" text-anchor="middle" font-family="sans-serif" font-size="5" font-weight="bold" fill="#ef4444">!</text>
    </g>
  </g>

  <!-- Without items -->
  <g font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" fill="#64748b">
    <g transform="translate(46, 74)">
      <circle cx="4" cy="0" r="2.5" fill="#fca5a5" opacity="0.6"/>
      <text x="14" y="4">Jumps into code immediately</text>
    </g>
    <g transform="translate(46, 100)">
      <circle cx="4" cy="0" r="2.5" fill="#fca5a5" opacity="0.6"/>
      <text x="14" y="4">Reviews only when asked</text>
    </g>
    <g transform="translate(46, 126)">
      <circle cx="4" cy="0" r="2.5" fill="#fca5a5" opacity="0.6"/>
      <text x="14" y="4">Forgets past decisions</text>
    </g>
    <g transform="translate(46, 152)">
      <circle cx="4" cy="0" r="2.5" fill="#fca5a5" opacity="0.6"/>
      <text x="14" y="4"><tspan font-family="monospace" fill="#dc2626" font-size="10">rm -rf</tspan> runs without warning</text>
    </g>
    <g transform="translate(46, 178)">
      <circle cx="4" cy="0" r="2.5" fill="#fca5a5" opacity="0.6"/>
      <text x="14" y="4">One task at a time</text>
    </g>
  </g>

  <!-- CENTER: Arrow -->
  <g transform="translate(360, 130)">
    <rect x="-14" y="-16" width="28" height="32" rx="7" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
    <path d="M-6 0 L6 0 M3 -4 L7 0 L3 4" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- RIGHT: With Harness -->
  <g filter="url(#shBA)">
    <rect x="376" y="20" width="320" height="220" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  </g>
  <circle cx="402" cy="44" r="9" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <path d="M398 44 L401 47 L407 40" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="416" y="48" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="12" font-weight="700" fill="#16a34a">With Harness</text>

  <!-- Order illustration -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="50" height="24" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5" opacity="0.6"/>
    <rect x="5" y="30" width="50" height="24" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5" opacity="0.5"/>
    <rect x="10" y="60" width="50" height="24" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5" opacity="0.4"/>
    <path d="M10 10 L14 14 L22 6" fill="none" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <path d="M15 40 L19 44 L27 36" fill="none" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <path d="M20 70 L24 74 L32 66" fill="none" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <path d="M65 12 Q80 12 80 30 Q80 42 65 42 Q80 42 80 60 Q80 72 65 72" fill="none" stroke="#16a34a" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.3"/>
  </g>

  <!-- With items -->
  <g font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" fill="#64748b">
    <g transform="translate(398, 74)">
      <path d="M1 0 L4 3 L9 -3" fill="none" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
      <text x="16" y="4"><tspan font-weight="600" fill="#16a34a">Plans first</tspan>, then executes</text>
    </g>
    <g transform="translate(398, 100)">
      <path d="M1 0 L4 3 L9 -3" fill="none" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
      <text x="16" y="4"><tspan font-weight="600" fill="#16a34a">Auto-reviews</tspan> every change</text>
    </g>
    <g transform="translate(398, 126)">
      <path d="M1 0 L4 3 L9 -3" fill="none" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
      <text x="16" y="4"><tspan font-weight="600" fill="#16a34a">SSOT files</tspan> preserve context</text>
    </g>
    <g transform="translate(398, 152)">
      <path d="M1 0 L4 3 L9 -3" fill="none" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
      <text x="16" y="4">Dangerous commands <tspan font-weight="600" fill="#16a34a">blocked</tspan></text>
    </g>
    <g transform="translate(398, 178)">
      <path d="M1 0 L4 3 L9 -3" fill="none" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
      <text x="16" y="4"><tspan font-weight="600" fill="#16a34a">Parallel workers</tspan> simultaneously</text>
    </g>
  </g>
</svg>
