<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" fill="none">
  <defs>
    <filter id="shSke"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.1"/></filter>
    <radialGradient id="hubGle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F7931A" stop-opacity="0.06"/><stop offset="1" stop-color="#F7931A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="240" rx="12" fill="#ffffff"/>
  <rect width="640" height="240" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Glow -->
  <circle cx="160" cy="120" r="100" fill="url(#hubGle)"/>

  <!-- Central node -->
  <g filter="url(#shSke)">
    <circle cx="160" cy="120" r="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.2"/>
    <text x="160" y="116" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="8.5" fill="#64748b">Just say</text>
    <text x="160" y="130" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9.5" font-weight="700" fill="#F7931A">"implement"</text>
  </g>

  <!-- Skill nodes -->
  <!-- impl -->
  <g opacity="0.9">
    <line x1="186" y1="108" x2="228" y2="72" stroke="#F7931A" stroke-width="0.8" opacity="0.2"/>
    <circle cx="240" cy="62" r="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="240" y="59" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#F7931A">impl</text>
    <text x="240" y="70" text-anchor="middle" font-size="6" fill="#94a3b8">auto-select</text>
  </g>
  <!-- review -->
  <g opacity="0.85">
    <line x1="186" y1="126" x2="238" y2="138" stroke="#EA580C" stroke-width="0.8" opacity="0.2"/>
    <circle cx="258" cy="144" r="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="258" y="141" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#EA580C">review</text>
    <text x="258" y="151" text-anchor="middle" font-size="6" fill="#94a3b8">auto-select</text>
  </g>
  <!-- verify -->
  <g opacity="0.8">
    <line x1="176" y1="146" x2="212" y2="195" stroke="#D97706" stroke-width="0.8" opacity="0.2"/>
    <circle cx="220" cy="206" r="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="220" y="203" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#D97706">verify</text>
    <text x="220" y="213" text-anchor="middle" font-size="6" fill="#94a3b8">auto</text>
  </g>
  <!-- auth -->
  <g opacity="0.7">
    <line x1="144" y1="146" x2="106" y2="192" stroke="#B45309" stroke-width="0.8" opacity="0.2"/>
    <circle cx="96" cy="202" r="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="96" y="199" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#B45309">auth</text>
    <text x="96" y="209" text-anchor="middle" font-size="6" fill="#94a3b8">auto</text>
  </g>
  <!-- plan -->
  <g opacity="0.75">
    <line x1="138" y1="104" x2="82" y2="62" stroke="#F7931A" stroke-width="0.8" opacity="0.2"/>
    <circle cx="72" cy="52" r="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="72" y="49" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#F7931A">plan</text>
    <text x="72" y="59" text-anchor="middle" font-size="6" fill="#94a3b8">auto</text>
  </g>
  <!-- ci -->
  <g opacity="0.65">
    <line x1="134" y1="120" x2="68" y2="130" stroke="#92400E" stroke-width="0.8" opacity="0.2"/>
    <circle cx="56" cy="132" r="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="56" y="135" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#92400E">ci</text>
  </g>
  <!-- memory -->
  <g opacity="0.6">
    <line x1="170" y1="93" x2="170" y2="42" stroke="#EA580C" stroke-width="0.8" opacity="0.2"/>
    <circle cx="170" cy="30" r="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
    <text x="170" y="33" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="600" fill="#EA580C">memory</text>
  </g>

  <!-- Faded nodes -->
  <circle cx="310" cy="38" r="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5" opacity="0.5"/>
  <circle cx="290" cy="210" r="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="56" cy="185" r="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5" opacity="0.35"/>

  <!-- Right side -->
  <g transform="translate(340, 30)">
    <text x="0" y="0" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="22" font-weight="800">
      <tspan fill="#F7931A">41</tspan><tspan fill="#94a3b8"> Skills</tspan>
    </text>
    <text x="0" y="20" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" fill="#64748b">Zero config. Auto-loads based on context.</text>

    <!-- Mappings -->
    <g transform="translate(0, 46)" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="10">
      <g transform="translate(0, 0)">
        <text x="0" y="0" fill="#374151">"implement login"</text>
        <text x="150" y="0" fill="#94a3b8">-></text>
        <rect x="168" y="-10" width="52" height="16" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.5"/>
        <text x="194" y="1" text-anchor="middle" font-family="monospace" font-size="8" fill="#F7931A">impl</text>
      </g>
      <g transform="translate(0, 26)">
        <text x="0" y="0" fill="#374151">"review this code"</text>
        <text x="150" y="0" fill="#94a3b8">-></text>
        <rect x="168" y="-10" width="52" height="16" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.5"/>
        <text x="194" y="1" text-anchor="middle" font-family="monospace" font-size="8" fill="#EA580C">review</text>
      </g>
      <g transform="translate(0, 52)">
        <text x="0" y="0" fill="#374151">"fix the build error"</text>
        <text x="150" y="0" fill="#94a3b8">-></text>
        <rect x="168" y="-10" width="52" height="16" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.5"/>
        <text x="194" y="1" text-anchor="middle" font-family="monospace" font-size="8" fill="#D97706">verify</text>
      </g>
      <g transform="translate(0, 78)">
        <text x="0" y="0" fill="#374151">"add Stripe payments"</text>
        <text x="150" y="0" fill="#94a3b8">-></text>
        <rect x="168" y="-10" width="52" height="16" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.5"/>
        <text x="194" y="1" text-anchor="middle" font-family="monospace" font-size="8" fill="#B45309">auth</text>
      </g>
      <g transform="translate(0, 104)">
        <text x="0" y="0" fill="#374151">"CI is broken"</text>
        <text x="150" y="0" fill="#94a3b8">-></text>
        <rect x="168" y="-10" width="52" height="16" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.5"/>
        <text x="194" y="1" text-anchor="middle" font-family="monospace" font-size="8" fill="#92400E">ci</text>
      </g>
    </g>

    <text x="0" y="195" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#94a3b8">Just talk naturally. No slash commands needed.</text>
  </g>
</svg>