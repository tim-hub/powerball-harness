<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" fill="none">
  <defs>
    <filter id="shSe"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.12"/></filter>
    <filter id="shGe"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#16a34a" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="600" height="240" rx="12" fill="#ffffff"/>
  <rect width="600" height="240" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Shield icon -->
  <g filter="url(#shGe)" transform="translate(90, 120)">
    <path d="M0 -55 L50 -38 L50 10 C50 40 25 60 0 68 C-25 60 -50 40 -50 10 L-50 -38Z" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <path d="M0 -40 L35 -27 L35 8 C35 30 18 45 0 50 C-18 45 -35 30 -35 8 L-35 -27Z" fill="none" stroke="#86efac" stroke-width="0.5" opacity="0.5"/>
    <path d="M-18 5 L-6 17 L20 -10" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Blocked items -->
  <g transform="translate(32, 48)" opacity="0.8">
    <rect x="0" y="0" width="68" height="22" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
    <text x="34" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">rm -rf /</text>
    <line x1="5" y1="3" x2="63" y2="19" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  </g>
  <g transform="translate(15, 180)" opacity="0.7">
    <rect x="0" y="0" width="56" height="22" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
    <text x="28" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">sudo</text>
    <line x1="5" y1="3" x2="51" y2="19" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  </g>
  <g transform="translate(115, 28)" opacity="0.6">
    <rect x="0" y="0" width="62" height="22" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
    <text x="31" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">--force</text>
    <line x1="5" y1="3" x2="57" y2="19" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Rules -->
  <g transform="translate(210, 36)" font-family="-apple-system, 'Hiragino Sans', sans-serif">
    <!-- Rule 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="360" height="40" rx="6" fill="#fafafa" stroke="#e2e8f0" stroke-width="0.8"/>
      <g transform="translate(14, 20)">
        <rect x="0" y="-6" width="10" height="12" rx="2" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
        <line x1="2" y1="-3" x2="8" y2="3" stroke="#ef4444" stroke-width="1"/>
        <line x1="8" y1="-3" x2="2" y2="3" stroke="#ef4444" stroke-width="1"/>
      </g>
      <text x="34" y="16" font-size="10" font-weight="600" fill="#1e293b"><tspan font-family="monospace" fill="#dc2626">.git/</tspan>  <tspan font-family="monospace" fill="#dc2626">.env</tspan>  <tspan fill="#64748b">Secrets</tspan></text>
      <text x="34" y="30" font-size="9" fill="#94a3b8">Write operations blocked</text>
    </g>

    <!-- Rule 2 -->
    <g transform="translate(0, 48)">
      <rect x="0" y="0" width="360" height="40" rx="6" fill="#fafafa" stroke="#e2e8f0" stroke-width="0.8"/>
      <g transform="translate(14, 20)">
        <rect x="0" y="-6" width="10" height="12" rx="2" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
        <polygon points="5,-3 7.5,2 2.5,2" fill="#f59e0b" opacity="0.8"/>
      </g>
      <text x="34" y="16" font-size="10" font-weight="600" fill="#1e293b"><tspan font-family="monospace" fill="#d97706">rm -rf</tspan>  <tspan font-family="monospace" fill="#d97706">sudo</tspan>  <tspan font-family="monospace" fill="#d97706">--force</tspan></text>
      <text x="34" y="30" font-size="9" fill="#94a3b8">Confirmation required before execution</text>
    </g>

    <!-- Rule 3 -->
    <g transform="translate(0, 96)">
      <rect x="0" y="0" width="360" height="40" rx="6" fill="#fafafa" stroke="#e2e8f0" stroke-width="0.8"/>
      <g transform="translate(14, 20)">
        <rect x="0" y="-6" width="10" height="12" rx="2" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5"/>
        <path d="M2 0 L4.5 2.5 L8 -2" fill="none" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      <text x="34" y="16" font-size="10" font-weight="600" fill="#1e293b"><tspan font-family="monospace" fill="#16a34a">git status</tspan>  <tspan font-family="monospace" fill="#16a34a">npm test</tspan></text>
      <text x="34" y="30" font-size="9" fill="#94a3b8">Safe commands auto-allowed</text>
    </g>

    <!-- Rule 4 -->
    <g transform="translate(0, 144)">
      <rect x="0" y="0" width="360" height="40" rx="6" fill="#fafafa" stroke="#e2e8f0" stroke-width="0.8"/>
      <g transform="translate(14, 20)">
        <rect x="0" y="-6" width="10" height="12" rx="2" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
        <text x="5" y="3" text-anchor="middle" font-size="8" font-weight="bold" fill="#d97706">!</text>
      </g>
      <text x="34" y="16" font-size="10" font-weight="600" fill="#1e293b">Test Tampering Detection</text>
      <text x="34" y="30" font-size="9" fill="#94a3b8">Warns on <tspan font-family="monospace" fill="#d97706">it.skip</tspan> or assertion removal</text>
    </g>
  </g>
</svg>
