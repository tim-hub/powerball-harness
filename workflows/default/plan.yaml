# /plan workflow definition
# Convert feature requests into a structured task list

phase: plan
description: "Phase to update Plans.md and break down tasks"

steps:
  # Step 1: Read repository context
  - id: read-context
    skill: core-read-repo-context
    input:
      files:
        - README.md
        - Plans.md
        - package.json
      context_from:
        - repo_tree
        - open_files
    mode: required

  # Step 2: Gather requirements (when no input is provided)
  - id: gather-requirements
    skill: init-requirements
    condition: "!user_prompt"
    input:
      context_from:
        - user_intent
    output:
      variables:
        - feature_request
    mode: optional

  # Step 3: Plan the feature
  - id: plan-feature
    skill: plan-feature
    input:
      files:
        - Plans.md
      context_from:
        - user_prompt
        - repo_diff
        - tech_stack
      variables:
        - feature_request
    output:
      update_files:
        - Plans.md
      variables:
        - task_count
        - phase_name
    mode: required

  # Step 4: Review the plan (optional)
  - id: review-plan
    skill: plan-review
    input:
      files:
        - Plans.md
      context_from:
        - previous_step_output
    mode: optional

# Output on success
on_success:
  message: |
    ✅ Plan is complete!

    📄 Added {{task_count}} tasks to Plans.md.

    Next steps:
    - "Start {{phase_name}}" → Begin implementation
    - "Show the plan" → View details
    - "Revise it" → Adjust the plan

# Output on error
on_error:
  message: |
    ⚠️ An error occurred during plan creation.

    Please tell me what you want to do again.
