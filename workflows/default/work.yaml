# /work workflow definition
# Executes plans from Plans.md and generates actual code

phase: work
description: "Phase that executes planned tasks and generates working code"

steps:
  # Step 1: Check current task status
  - id: read-context
    skill: core-read-repo-context
    input:
      files:
        - Plans.md
        - AGENTS.md
      context_from:
        - repo_tree
        - git_status
    mode: required

  # Step 1.5: Parse /work command flags
  - id: parse-work-flags
    skill: parse-work-flags
    input:
      context_from:
        - user_prompt
    output:
      variables:
        - full_mode
        - parallel_count
        - isolation_mode
        - commit_strategy
        - deploy_after_commit
        - max_iterations
        - skip_cross_review
        - resume_session_id
        - resume_latest
        - fork_session_id
        - fork_reason
    mode: required

  # Step 1.6: Session resume/fork control (only when specified)
  - id: session-control
    skill: session-control
    condition: "resume_latest == true || resume_session_id != '' || fork_session_id != '' || fork_reason != ''"
    input:
      variables:
        - resume_session_id
        - resume_latest
        - fork_session_id
        - fork_reason
    mode: required

  # Step 2: Identify tasks to execute
  - id: identify-tasks
    skill: plans-management
    input:
      files:
        - Plans.md
      context_from:
        - user_prompt
    output:
      variables:
        - target_tasks
        - current_phase
    mode: required

  # Step 2.5: Update marker to WIP at task start (absorbs /start-task equivalent)
  # pm:requested / cursor:requested / cc:TODO → auto-transition to cc:WIP
  - id: update-marker-to-wip
    skill: plans-management
    input:
      files:
        - Plans.md
      action: update_marker
      from: "pm:requested|cursor:requested|cc:TODO"
      to: "cc:WIP"
      target: target_tasks
    output:
      update_files:
        - Plans.md
    mode: required

  # Step 3: Execute tasks (--full mode branch)
  # --full mode: Execute Phase 1-4
  # Normal mode: Execute existing execute-task flow

  # === Phase 1: Build dependency graph and launch task-workers in parallel (--full only) ===
  # Step 3.1: Build dependency graph
  - id: build-dependency-graph
    skill: build-dependency-graph
    condition: "full_mode == true"
    input:
      files:
        - Plans.md
      variables:
        - target_tasks
    output:
      variables:
        - parallel_groups
        - task_files
    mode: required

  # Step 3.2: Prepare worktrees (only when isolation=worktree)
  - id: setup-worktrees
    skill: setup-worktrees
    condition: "full_mode == true && isolation_mode == 'worktree'"
    input:
      variables:
        - parallel_groups
        - task_files
      context_from:
        - git_status
    output:
      variables:
        - worktree_paths
        - worktree_branches
    mode: required

  # Step 3.3: Launch task-workers in parallel
  - id: run-task-workers
    skill: run-task-workers
    condition: "full_mode == true"
    input:
      variables:
        - parallel_groups
        - task_files
        - parallel_count
        - max_iterations
        - isolation_mode
        - commit_strategy
        - worktree_paths
        - worktree_branches
    output:
      variables:
        - worker_results
        - all_ready
        - escalation_count
        - changed_files
    mode: required

  # Step 3.4: Merge worktrees (only when isolation=worktree)
  - id: merge-worktrees
    skill: merge-worktrees
    condition: "full_mode == true && isolation_mode == 'worktree'"
    input:
      variables:
        - worktree_branches
        - worker_results
        - commit_strategy
      context_from:
        - git_status
    output:
      variables:
        - merged
        - conflict_files
    mode: required

  # Step 3.5: Determine review mode (for Phase 2)
  - id: determine-review-mode
    skill: determine-review-mode
    condition: "full_mode == true && skip_cross_review == false"
    input:
      context_from:
        - config_file
    output:
      variables:
        - review_mode
    mode: required

  # === Phase 2: Cross-review (--full only, when skip_cross_review=false) ===
  - id: cross-review
    skill: harness-review
    condition: "full_mode == true && skip_cross_review == false"
    input:
      files: "{{changed_files}}"
      context_from:
        - code_content
      variables:
        - review_mode
    output:
      variables:
        - review_result
        - review_grade
        - review_issues
    mode: required

  # === Phase 3: Commit execution (--full only) ===
  # Step 3.6: Execute commit
  - id: execute-commit
    skill: execute-commit
    condition: "full_mode == true && commit_strategy != 'task'"
    input:
      variables:
        - commit_strategy
        - worker_results
        - review_result
        - changed_files
    output:
      variables:
        - committed
        - commit_hash
        - commit_message
    mode: required

  # === Phase 4: Deploy (--full only, when deploy_after_commit=true) ===
  - id: deploy
    skill: deploy
    condition: "full_mode == true && deploy_after_commit == true"
    input:
      variables:
        - commit_hash
      context_from:
        - config_file
    output:
      variables:
        - deploy_url
        - deploy_status
    mode: required

  # === Normal mode (when --full is not specified): existing flow ===
  # Step 3: Execute tasks (loop)
  - id: execute-task
    skill: work-impl-feature
    condition: "full_mode == false"
    input:
      variables:
        - target_tasks
      context_from:
        - tech_stack
        - existing_code
    output:
      update_files:
        - Plans.md
      created_files: true
    mode: required
    loop: target_tasks

  # Step 4: Verify build
  - id: verify-build
    skill: verify-build
    condition: "full_mode == false"
    input:
      commands:
        - npm run build
        - npm run dev
    mode: optional

  # Step 5: Self-review (optional)
  - id: self-review
    skill: review-changes
    condition: "full_mode == false"
    input:
      context_from:
        - git_diff
    mode: optional

# Output on success
on_success:
  message: |
    ✅ Phase complete!

    **Completed tasks:**
    {{completed_tasks}}

    **Generated files:**
    {{created_files}}

    Next steps:
    - "Run it" → verify behavior
    - "Review it" → code quality check
    - "Next phase" → continue execution

# Output on error
on_error:
  skill: error-recovery
  max_retries: 3
  message: |
    ⚠️ An error occurred during execution.

    Attempting automatic recovery...
